apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  namespace: logging
spec:
  selector:
    matchLabels:
      app: fluentd
  template:
    metadata:
      labels:
        app: fluentd
    spec:
      containers:
      - name: fluentd
        image: fluent/fluentd:v1.16
        resources:
          limits:
            memory: 200Mi
            cpu: 100m
        volumeMounts:
          - name: config
            mountPath: /fluentd/etc
      volumes:
        - name: config
          configMap:
            name: fluentd-config
